<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Aula - </title>
</head>
<body>
    
    <div class="caixa" id="login">
        <h1>Login</h1>
        
        <label for="email">E-mail</label>
        <input type="email" name="email" id="email" placeholder="Ex: slsla@gmail.com" autocomplete="off">

        <label for="senha">Senha</label>
        <input type="password" name="senha" id="senha" placeholder="Ex: 1234" autocomplete="off">
        
        <div class="caixa3">
            <input type="checkbox" name="lembre" id="lembre">
            <label for="lembre">Lembre-se de mim</label>
            <a onclick="trocarpag()" href="#">Esqueceu a senha?</a>
        </div>

        <div class="caixa2">
            <button onclick="logar()">Entrar</button>
            <button onclick="registrar()">Registre-se</button>
        </div>
        
        <p></p>
    </div>

    <div class="caixa" id="novasenha">
        <h1>Trocar a senha</h1>

        <label for="senha">Senha antiga</label>
        <input type="password" name="senha" id="senha" placeholder="Ex: 1234" autocomplete="off">

        <label for="senhanova">Senha nova</label>
        <input type="password" name="senhanova" id="senhanova" placeholder="Ex: 1234" autocomplete="off">

        <div class="caixa2">
            <button onclick="voltar()">Voltar</button>
            <button onclick="trocarsenha()">Trocar senha</button>
        </div>
        
        <p></p>
    </div>
    <script src="./main.js"></script>
</body>
</html>
